<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语文笔记生成器 · AI智能版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --primary-dark: #3730A3;
            --accent: #F59E0B;
            --accent-light: #FCD34D;
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --text: #1E293B;
            --text-secondary: #64748B;
            --border: #E2E8F0;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --radius: 16px;
            --shadow: 0 4px 24px rgba(0,0,0,0.08);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
        }

        /* ===== Hero 区域 ===== */
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 60px 20px 80px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 60%);
            animation: float 15s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }
        .hero h1 {
            font-size: 2.8rem;
            color: #fff;
            margin-bottom: 12px;
            position: relative;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .hero p {
            color: rgba(255,255,255,0.85);
            font-size: 1.1rem;
            position: relative;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ===== 装饰插画 ===== */
        .hero-art {
            position: relative;
            margin: 30px auto 0;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .hero-art .icon-item {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }
        .hero-art .icon-item:hover {
            transform: translateY(-5px) scale(1.05);
        }

        /* ===== 主内容区 ===== */
        .container {
            max-width: 900px;
            margin: -40px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
        }

        /* ===== 搜索卡片 ===== */
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 14px 20px;
            font-size: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #F8FAFC;
        }
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,70,229,0.1);
            background: #fff;
        }
        .input-group input::placeholder {
            color: #94A3B8;
        }
        .btn {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(79,70,229,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-success {
            background: var(--success);
            color: #fff;
        }
        .btn-success:hover { background: #059669; }

        /* ===== 提示条 ===== */
        .tip-bar {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tip-bar.warning {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #FDE68A;
        }
        .tip-bar.info {
            background: #DBEAFE;
            color: #1E40AF;
            border: 1px solid #93C5FD;
        }
        .tip-bar.success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #6EE7B7;
        }

        /* ===== 示例课文 ===== */
        .examples {
            margin-top: 20px;
        }
        .examples-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }
        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .chip {
            padding: 8px 16px;
            background: #F1F5F9;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.88rem;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text);
        }
        .chip:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        /* ===== Loading ===== */
        .loading-card {
            text-align: center;
            padding: 50px 30px;
            display: none;
        }
        .loading-card .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-card p {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .loading-card .progress {
            margin-top: 12px;
            font-size: 0.88rem;
            color: #94A3B8;
        }

        /* ===== 结果卡片 ===== */
        .result-card {
            display: none;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .result-header h2 {
            font-size: 1.3rem;
            color: var(--text);
        }
        .result-actions {
            display: flex;
            gap: 8px;
        }
        .note-content {
            line-height: 1.9;
            font-size: 0.95rem;
            color: var(--text);
        }
        .note-content h1 { font-size: 1.6rem; margin: 28px 0 12px; color: var(--primary-dark); font-weight: 700; }
        .note-content h2 { font-size: 1.3rem; margin: 22px 0 10px; color: var(--text); font-weight: 700; border-left: 4px solid var(--primary); padding-left: 12px; }
        .note-content h3 { font-size: 1.1rem; margin: 16px 0 8px; color: var(--primary); font-weight: 600; }
        .note-content p { margin: 8px 0; }
        .note-content hr { border: none; border-top: 1px solid var(--border); margin: 24px 0; }
        .note-content strong { color: var(--primary-dark); }
        .note-content blockquote {
            border-left: 4px solid var(--accent);
            background: #FEF3C7;
            padding: 12px 16px;
            margin: 12px 0;
            border-radius: 0 8px 8px 0;
            color: #92400E;
        }
        .note-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        .note-content th {
            background: var(--primary);
            color: #fff;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
        }
        .note-content th:first-child { border-radius: 8px 0 0 0; }
        .note-content th:last-child { border-radius: 0 8px 0 0; }
        .note-content td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border);
        }
        .note-content tr:nth-child(even) td { background: #F8FAFC; }
        .note-content tr:hover td { background: #EEF2FF; }

        /* ===== 错误卡片 ===== */
        .error-card {
            display: none;
            background: #FEF2F2;
            border: 1px solid #FECACA;
            color: #991B1B;
            padding: 20px 24px;
            border-radius: var(--radius);
        }

        /* ===== 底部信息 ===== */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
        .footer a {
            color: var(--primary);
            text-decoration: none;
        }
        .footer a:hover { text-decoration: underline; }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .hero-art .icon-item { width: 60px; height: 60px; font-size: 1.6rem; }
            .input-group { flex-direction: column; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Hero -->
    <div class="hero">
        <h1>语文笔记生成器</h1>
        <p>输入课文名称，AI 自动爬取资料并生成详细学霸笔记</p>
        <div class="hero-art">
            <div class="icon-item">📖</div>
            <div class="icon-item">🤖</div>
            <div class="icon-item">📝</div>
            <div class="icon-item">🎨</div>
        </div>
    </div>

    <div class="container">
        <!-- 搜索卡片 -->
        <div class="card">
            <div class="input-group">
                <input type="text" id="lessonName" placeholder="输入课文名称，例如：海底世界" />
                <button class="btn btn-primary" id="generateBtn" onclick="generateNote()">
                    <span>✨</span> 生成笔记
                </button>
            </div>

            <div class="tip-bar warning">
                <span>⚡</span> 每次点击都会重新爬取并调用 AI 生成，不会使用缓存
            </div>

            <div id="tokenStatus" class="tip-bar info">
                <span>⏳</span> 正在检测 Token...
            </div>

            <div class="examples">
                <div class="examples-label">试试这些课文：</div>
                <div class="example-chips">
                    <div class="chip" onclick="quickFill('海底世界')">海底世界</div>
                    <div class="chip" onclick="quickFill('富饶的西沙群岛')">富饶的西沙群岛</div>
                    <div class="chip" onclick="quickFill('美丽的小兴安岭')">美丽的小兴安岭</div>
                    <div class="chip" onclick="quickFill('大自然的声音')">大自然的声音</div>
                    <div class="chip" onclick="quickFill('花钟')">花钟</div>
                    <div class="chip" onclick="quickFill('赵州桥')">赵州桥</div>
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="card loading-card">
            <div class="spinner"></div>
            <p id="loadingText">正在触发爬虫...</p>
            <div class="progress" id="progressInfo"></div>
        </div>

        <!-- 结果 -->
        <div id="resultCard" class="card result-card">
            <div class="result-header">
                <h2>📖 生成结果</h2>
                <div class="result-actions">
                    <button class="btn btn-success" onclick="copyNote()">📋 复制</button>
                </div>
            </div>
            <div id="noteContent" class="note-content"></div>
        </div>

        <!-- 错误 -->
        <div id="errorCard" class="error-card"></div>
    </div>

    <div class="footer">
        <p>语文笔记生成器 · Powered by AI · <a href="https://github.com/meng623/yuwen-note" target="_blank">GitHub</a></p>
    </div>

    <script>
        const REPO_OWNER = "meng623";
        const REPO_NAME = "yuwen-note";

        function quickFill(name) {
            document.getElementById('lessonName').value = name;
            generateNote();
        }

        function checkTokenStatus() {
            const token = localStorage.getItem('github_token');
            const el = document.getElementById('tokenStatus');
            if (token && token.startsWith('ghp_')) {
                el.innerHTML = '<span>✅</span> Token 已配置，功能可用';
                el.className = 'tip-bar success';
                return true;
            } else {
                el.innerHTML = '<span>⚠️</span> 未配置 Token — 按 F12 输入：<code style="background:#fff;padding:2px 6px;border-radius:4px;">localStorage.setItem("github_token", "你的token")</code>';
                el.className = 'tip-bar warning';
                return false;
            }
        }

        async function generateNote() {
            const lessonName = document.getElementById('lessonName').value.trim();
            const btn = document.getElementById('generateBtn');

            if (!lessonName) { alert('请输入课文名称'); return; }

            btn.disabled = true;
            btn.innerHTML = '<span>⏳</span> 生成中...';

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'none';
            document.getElementById('loadingText').textContent = '正在触发爬虫...';
            document.getElementById('progressInfo').textContent = '';

            const token = localStorage.getItem('github_token');

            try {
                if (!token || !token.startsWith('ghp_')) {
                    throw new Error('未配置 GitHub Token，无法触发爬虫');
                }

                document.getElementById('loadingText').textContent = '正在连接 GitHub Actions...';
                const triggered = await triggerWorkflow(lessonName, token);
                if (!triggered) throw new Error('触发失败，请检查 Token 权限');

                document.getElementById('loadingText').textContent = '爬虫已启动，正在抓取资料...';
                document.getElementById('progressInfo').textContent = '预计需要 30-90 秒，请耐心等待';

                const note = await pollForNewResult(lessonName);

                if (note) {
                    document.getElementById('loadingText').textContent = '生成完成！';
                    displayNote(note);
                    document.getElementById('loading').style.display = 'none';
                } else {
                    throw new Error('爬取超时，请检查 Actions 运行状态');
                }
            } catch (error) {
                document.getElementById('errorCard').innerHTML = `<strong>❌ ${error.message}</strong><br><br>💡 可在 GitHub Actions 页面查看详细日志。`;
                document.getElementById('errorCard').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>✨</span> 生成笔记';
            }
        }

        async function triggerWorkflow(lessonName, token) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/actions/workflows/crawl.yml/dispatches`;
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ref: 'main', inputs: { lesson_name: lessonName } })
                });
                return resp.ok;
            } catch { return false; }
        }

        async function pollForNewResult(lessonName, maxAttempts = 120, interval = 5000) {
            const token = localStorage.getItem('github_token');
            for (let i = 0; i < maxAttempts; i++) {
                await new Promise(r => setTimeout(r, interval));
                document.getElementById('progressInfo').textContent = `等待中... (${i + 1}/${maxAttempts})`;
                try {
                    const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/data/${encodeURIComponent(lessonName)}.md`;
                    const resp = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                    if (resp.ok) {
                        const data = await resp.json();
                        const binary = atob(data.content.replace(/\n/g, ''));
                        const bytes = new Uint8Array(binary.length);
                        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                        const note = new TextDecoder('utf-8').decode(bytes);
                        if (note && note.length > 800 && !note.includes('正在努力生成中')) return note;
                    }
                } catch {}
            }
            return null;
        }

        function displayNote(note) {
            let html = note
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // 标题
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            html = html.replace(/^---$/gm, '<hr>');

            // 粗体 & 斜体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // 引用
            html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

            // 表格
            html = html.replace(/(?:^|\n)(\|.+\|)\n(\|[-| :]+\|)\n((?:\|.+\|\n?)+)/g, function(match, header, sep, body) {
                const headers = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
                const rows = body.trim().split('\n').map(row => {
                    const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
                    return `<tr>${cells}</tr>`;
                }).join('');
                return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
            });

            // 列表
            html = html.replace(/^\* (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // 换行
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/<br><(h[1-4]|hr|table|ul|blockquote)/g, '<$1');
            html = html.replace(/<\/(h[1-4]|hr|table|ul|blockquote)><br>/g, '</$1>');

            document.getElementById('noteContent').innerHTML = html;
            document.getElementById('resultCard').style.display = 'block';
        }

        function copyNote() {
            const text = document.getElementById('noteContent').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-success');
                btn.innerHTML = '<span>✅</span> 已复制';
                setTimeout(() => { btn.innerHTML = '<span>📋</span> 复制'; }, 2000);
            });
        }

        document.getElementById('lessonName').addEventListener('keypress', e => {
            if (e.key === 'Enter') generateNote();
        });

        checkTokenStatus();
    </script>
</body>
</html>
